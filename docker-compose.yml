version: "3.9"

networks:
  mentorapredict-net:
    driver: bridge

volumes:
  postgres_data:
    name: mp_postgres_data
  mongo_data:
    name: mp_mongo_data
  redis_data:
    name: mp_redis_data

services:

  postgres:
    image: postgres:16-alpine
    container_name: mp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB:       ${POSTGRES_DB:-mentorapredict}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mentorapredict-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mp_user} -d ${POSTGRES_DB:-mentorapredict}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7.0
    container_name: mp_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mp_mongo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}
      MONGO_INITDB_DATABASE:      ${MONGO_DB:-mentorapredict_nosql}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mentorapredict-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7.2-alpine
    container_name: mp_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - mentorapredict-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: mp_redis_ui
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}"
      HTTP_USER:   ${REDIS_UI_USER:-admin}
      HTTP_PASSWORD: ${REDIS_UI_PASSWORD:-admin}
    ports:
      - "8081:8081"
    networks:
      - mentorapredict-net
    depends_on:
      redis:
        condition: service_healthy

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: mp_mongo_ui
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-mp_mongo_user}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}
      ME_CONFIG_MONGODB_URL:           "mongodb://${MONGO_USER:-mp_mongo_user}:${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}@mongo:27017/"
      ME_CONFIG_BASICAUTH_USERNAME:    ${MONGO_UI_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD:    ${MONGO_UI_PASSWORD:-admin}
    ports:
      - "8082:8081"
    networks:
      - mentorapredict-net
    depends_on:
      mongo:
        condition: service_healthy

  kong:
    image: kong:3.6
    container_name: mp_kong
    restart: unless-stopped
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    volumes:
      - ./infra/kong/kong-template.yml:/etc/kong/kong.source.yml:ro
      - ./infra/kong/entrypoint.sh:/entrypoint.sh:ro
      - ./infra/keys:/secrets:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - mentorapredict-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: mp_api_gateway
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_GATEWAY_PORT:-3000}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: mp_auth_service
    restart: unless-stopped
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${AUTH_SERVICE_PORT:-3001}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: mp_user_service
    restart: unless-stopped
    ports:
      - "${USER_SERVICE_PORT:-3002}:3002"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${USER_SERVICE_PORT:-3002}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  academic-service:
    build:
      context: .
      dockerfile: services/academic-service/Dockerfile
    container_name: mp_academic_service
    restart: unless-stopped
    ports:
      - "${ACADEMIC_SERVICE_PORT:-3003}:3003"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${ACADEMIC_SERVICE_PORT:-3003}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      MONGO_HOST: ${MONGO_HOST:-mongo}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USER: ${MONGO_USER:-mp_mongo_user}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}
      MONGO_DB: ${MONGO_DB:-mentorapredict_nosql}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  metrics-service:
    build:
      context: .
      dockerfile: services/metrics-service/Dockerfile
    container_name: mp_metrics_service
    restart: unless-stopped
    ports:
      - "${METRICS_SERVICE_PORT:-3004}:3004"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${METRICS_SERVICE_PORT:-3004}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: mp_analytics_service
    restart: unless-stopped
    ports:
      - "${ANALYTICS_SERVICE_PORT:-3006}:3006"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${ANALYTICS_SERVICE_PORT:-3006}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  recommendation-service:
    build:
      context: .
      dockerfile: services/recommendation-service/Dockerfile
    container_name: mp_recommendation_service
    restart: unless-stopped
    ports:
      - "${RECOMMENDATION_SERVICE_PORT:-3005}:3005"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${RECOMMENDATION_SERVICE_PORT:-3005}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prediction-service:
    build:
      context: .
      dockerfile: services/prediction-service/Dockerfile
    container_name: mp_prediction_service
    restart: unless-stopped
    ports:
      - "${PREDICTION_SERVICE_PORT:-8000}:8000"
    environment:
      PYTHONUNBUFFERED: 1
      MONGO_HOST: ${MONGO_HOST:-mongo}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USER: ${MONGO_USER:-mp_mongo_user}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}
      MONGO_DB: ${MONGO_DB:-mentorapredict_nosql}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - mentorapredict-net
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: mp_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3007}:80"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    networks:
      - mentorapredict-net
    depends_on:
      - api-gateway
