# MentoraPredict — Development stack (DB-less Kong + core services)
# Usage: docker compose -f docker-compose.dev.yml up -d

networks:
  mentorapredict-net:
    driver: bridge

volumes:
  postgres_data:
    name: mp_dev_postgres_data
  mongo_data:
    name: mp_dev_mongo_data
  redis_data:
    name: mp_dev_redis_data

services:
  postgres:
    image: postgres:16-alpine
    container_name: mp_dev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mentorapredict-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mp_user} -d ${POSTGRES_DB:-mentorapredict}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7.0
    container_name: mp_dev_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mp_mongo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-mentorapredict_nosql}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mentorapredict-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7.2-alpine
    container_name: mp_dev_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - mentorapredict-net
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  kong:
    image: kong:3.6
    container_name: mp_dev_kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    volumes:
      - ./infra/kong/kong.yml:/etc/kong/kong.source.yml:ro
      - ./infra/kong/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - mentorapredict-net
    depends_on:
      auth-service:
        condition: service_started
      academic-service:
        condition: service_started
      analytics-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  konga:
    image: pantsel/konga:0.14.9
    container_name: mp_dev_konga
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      NODE_ENV: development
      DB_ADAPTER: localDiskDb
      KONGA_HOOK_TIMEOUT: 120000
    ports:
      - "${KONGA_PORT:-1337}:1337"
    networks:
      - mentorapredict-net
    depends_on:
      kong:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: mp_dev_auth_service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: ${AUTH_SERVICE_PORT:-3001}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8000}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: mp_dev_user_service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: ${USER_SERVICE_PORT:-3002}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8000}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  academic-service:
    build:
      context: .
      dockerfile: services/academic-service/Dockerfile
    container_name: mp_dev_academic_service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: ${ACADEMIC_SERVICE_PORT:-3003}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}
      MONGO_HOST: ${MONGO_HOST:-mongo}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USER: ${MONGO_USER:-mp_mongo_user}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}
      MONGO_DB: ${MONGO_DB:-mentorapredict_nosql}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8000}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:3002}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      user-service:
        condition: service_started

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: mp_dev_analytics_service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: ${ANALYTICS_SERVICE_PORT:-3004}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}
      MONGO_HOST: ${MONGO_HOST:-mongo}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USER: ${MONGO_USER:-mp_mongo_user}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}
      MONGO_DB: ${MONGO_DB:-mentorapredict_nosql}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      ACADEMIC_SERVICE_URL: ${ACADEMIC_SERVICE_URL:-http://academic-service:3003}
      RISK_HIGH_THRESHOLD: ${RISK_HIGH_THRESHOLD:-40}
      RISK_CRITICAL_THRESHOLD: ${RISK_CRITICAL_THRESHOLD:-25}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8000}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      academic-service:
        condition: service_started
