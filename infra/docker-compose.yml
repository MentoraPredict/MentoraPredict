version: "3.9"

# ============================================================
# MentoraPredict — Local Development Infrastructure
# Provides: PostgreSQL, MongoDB, Redis
# Services are NOT connected to microservices yet (Phase 0 infra)
# Usage: docker compose up -d
# ============================================================

networks:
  mentorapredict-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:

services:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL — Primary relational store
  # Covers: users, academic data, metrics, analytics
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB:       ${POSTGRES_DB:-mentorapredict}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - mentorapredict-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mp_user} -d ${POSTGRES_DB:-mentorapredict}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────
  # MongoDB — NoSQL store for AI logs, recommendations, audit
  # ──────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: mp_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mp_mongo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}
      MONGO_INITDB_DATABASE:      ${MONGO_DB:-mentorapredict_nosql}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./infra/docker/mongo/init:/docker-entrypoint-initdb.d:ro
    networks:
      - mentorapredict-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────────────────────
  # Redis — Cache layer: sessions, metrics, dashboards
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: mp_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - mentorapredict-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Redis Commander — Optional web UI for Redis (dev only)
  # Access: http://localhost:8081
  # ──────────────────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: mp_redis_ui
    restart: unless-stopped
    profiles: ["tools"]   # Only starts with: docker compose --profile tools up
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}"
      HTTP_USER:   ${REDIS_UI_USER:-admin}
      HTTP_PASSWORD: ${REDIS_UI_PASSWORD:-admin}
    ports:
      - "8081:8081"
    networks:
      - mentorapredict-net
    depends_on:
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────
  # Mongo Express — Optional web UI for MongoDB (dev only)
  # Access: http://localhost:8082
  # ──────────────────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: mp_mongo_ui
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-mp_mongo_user}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}
      ME_CONFIG_MONGODB_URL:           "mongodb://${MONGO_USER:-mp_mongo_user}:${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}@mongo:27017/"
      ME_CONFIG_BASICAUTH_USERNAME:    ${MONGO_UI_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD:    ${MONGO_UI_PASSWORD:-admin}
    ports:
      - "8082:8081"
    networks:
      - mentorapredict-net
    depends_on:
      mongo:
        condition: service_healthy
