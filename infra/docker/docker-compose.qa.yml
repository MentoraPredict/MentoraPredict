networks:
  mentorapredict-net:
    name: mp_network
    external: true

services:
  kong:
    image: kong:3.6
    container_name: mp_kong
    restart: always
    ports:
      - "${KONG_PORT:-80}:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    volumes:
      - ../kong/kong-template.yml:/etc/kong/kong.source.yml:ro
      - ../kong/entrypoint.sh:/entrypoint.sh:ro
      - ../keys:/secrets:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - mentorapredict-net

  auth-service:
    image: ${DOCKERHUB_USERNAME}/auth-service:${IMAGE_TAG:-qa-latest}
    container_name: mp_auth_service
    restart: always
    expose:
      - 3001
    environment:
      NODE_ENV: production
      PORT: 3001
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
    networks:
      - mentorapredict-net

  academic-service:
    image: ${DOCKERHUB_USERNAME}/academic-service:${IMAGE_TAG:-qa-latest}
    container_name: mp_academic_service
    restart: always
    expose:
      - 3003
    environment:
      NODE_ENV: production
      PORT: 3003
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MONGO_HOST: ${MONGO_HOST:-mongo}
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - mentorapredict-net

  web:
    image: ${DOCKERHUB_USERNAME}/web:${IMAGE_TAG:-qa-latest}
    container_name: mp_web
    restart: always
    expose:
      - 80
    networks:
      - mentorapredict-net
