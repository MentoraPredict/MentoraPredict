    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-service:
    build:
      context: ..
      dockerfile: apps/analytics-service/Dockerfile
    container_name: mentorapredict-analytics-service
    ports:
      - "${ANALYTICS_SERVICE_PORT:-3006}:3006"
    environment:
      NODE_ENV: development
      PORT: ${ANALYTICS_SERVICE_PORT:-3006}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mentorapredict}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mentorapredict123}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - mentorapredict-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  recommendation-service:
    build:
      context: ..
      dockerfile: apps/recommendation-service/Dockerfile
    container_name: mentorapredict-recommendation-service
    ports:
      - "${RECOMMENDATION_SERVICE_PORT:-3005}:3005"
    environment:
      NODE_ENV: development
      PORT: ${RECOMMENDATION_SERVICE_PORT:-3005}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mentorapredict}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mentorapredict123}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - mentorapredict-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prediction-service:
    build:
      context: ..
      dockerfile: apps/prediction-service/Dockerfile
    container_name: mentorapredict-prediction-service
    ports:
      - "${PREDICTION_SERVICE_PORT:-8000}:8000"
    environment:
      PYTHONUNBUFFERED: 1
      MONGO_HOST: ${MONGO_HOST:-mongodb}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USER: ${MONGO_USER:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_DB: ${MONGO_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    
      web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: mentorapredict-web
    ports:
      - "${WEB_PORT:-3007}:3007"
    environment:
      NODE_ENV: development
    networks:
      - mentorapredict-network
    depends_on:
      - api-gateway
    
    networks:
      - mentorapredict-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  mentorapredict-network:
    driver: bridge
    name: mentorapredict-network

volumes:
  postgres_data:
    name: mentorapredict-postgres-data
  mongodb_data:
    name: mentorapredict-mongodb-data
  redis_data:
    name: mentorapredict-redis-data