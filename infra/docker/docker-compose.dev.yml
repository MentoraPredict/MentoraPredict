# MentoraPredict — Development stack (DB-less Kong + core services)
# Usage:
# 1. cp ../.env.example ../.env
# 2. (optional) bash infra/kong/generate-kong-keys.sh
# 3. docker compose -p mentorapredict -f infra/docker/docker-compose.dev.yml --env-file .\infra\.env.example up -d --build

networks:
  mentorapredict-net:
    driver: bridge

volumes:
  postgres_data:
    name: mp_dev_postgres_data
  mongo_data:
    name: mp_dev_mongo_data
  redis_data:
    name: mp_dev_redis_data

services:
  postgres:
    image: postgres:16-alpine
    container_name: mp_dev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mentorapredict-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mp_user} -d ${POSTGRES_DB:-mentorapredict}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7.0
    container_name: mp_dev_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mp_mongo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-mentorapredict_nosql}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mentorapredict-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: mp_mongo_ui
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_UI_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_UI_PASSWORD:-admin}
    ports:
      - "8082:8081"
    networks:
      - mentorapredict-net
    depends_on:
      mongo:
        condition: service_healthy

  redis:
    image: redis:7.2-alpine
    container_name: mp_dev_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - mentorapredict-net
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: mp_redis_ui
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD}"
      HTTP_USER: ${REDIS_UI_USER:-admin}
      HTTP_PASSWORD: ${REDIS_UI_PASSWORD:-admin}
    ports:
      - "8081:8081"
    networks:
      - mentorapredict-net
    depends_on:
      redis:
        condition: service_healthy

  kong:
    image: kong:3.6
    container_name: mp_dev_kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/secrets/public.pem}
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    volumes:
      - ../kong/kong-template.yml:/etc/kong/kong-template.yml:ro
      - ../kong/entrypoint.sh:/entrypoint.sh:ro
      - ../keys:/secrets:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      - mentorapredict-net
    depends_on:
      auth-service:
        condition: service_healthy
      academic-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  konga:
    image: pantsel/konga:0.14.9
    container_name: mp_dev_konga
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      NODE_ENV: development
      DB_ADAPTER: localDiskDb
      KONGA_HOOK_TIMEOUT: 120000
    ports:
      - "${KONGA_PORT:-1337}:1337"
    networks:
      - mentorapredict-net
    depends_on:
      kong:
        condition: service_healthy

  auth-service:
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    container_name: mp_dev_auth_service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: ${AUTH_SERVICE_PORT:-3001}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/secrets/private.pem}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/secrets/public.pem}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8000}
      SWAGGER_SERVER_URL: ${SWAGGER_SERVER_URL:-http://localhost:8000}
    volumes:
      - ../keys:/secrets:ro
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: ../..
      dockerfile: services/user-service/Dockerfile
    container_name: mp_dev_user_service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: ${USER_SERVICE_PORT:-3002}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8000}
      SWAGGER_SERVER_URL: ${SWAGGER_SERVER_URL:-http://localhost:8000}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  academic-service:
    build:
      context: ../..
      dockerfile: services/academic-service/Dockerfile
    container_name: mp_dev_academic_service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: ${ACADEMIC_SERVICE_PORT:-3003}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}
      MONGO_HOST: ${MONGO_HOST:-mongo}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USER: ${MONGO_USER:-mp_mongo_user}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}
      MONGO_DB: ${MONGO_DB:-mentorapredict_nosql}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8000}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:3002}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/secrets/private.pem}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/secrets/public.pem}
      SWAGGER_SERVER_URL: ${SWAGGER_SERVER_URL:-http://localhost:8000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
    volumes:
      - ../keys:/secrets:ro
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      user-service:
        condition: service_healthy

  analytics-service:
    build:
      context: ../..
      dockerfile: services/analytics-service/Dockerfile
    container_name: mp_dev_analytics_service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: ${ANALYTICS_SERVICE_PORT:-3004}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-mp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mp_secret_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-mentorapredict}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-mp_redis_secret_change_in_prod}
      MONGO_HOST: ${MONGO_HOST:-mongo}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USER: ${MONGO_USER:-mp_mongo_user}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-mp_mongo_secret_change_in_prod}
      MONGO_DB: ${MONGO_DB:-mentorapredict_nosql}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/secrets/private.pem}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/secrets/public.pem}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      ACADEMIC_SERVICE_URL: ${ACADEMIC_SERVICE_URL:-http://academic-service:3003}
      RISK_HIGH_THRESHOLD: ${RISK_HIGH_THRESHOLD:-40}
      RISK_CRITICAL_THRESHOLD: ${RISK_CRITICAL_THRESHOLD:-25}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8000}
      SWAGGER_SERVER_URL: ${SWAGGER_SERVER_URL:-http://localhost:8000}
    volumes:
      - ../keys:/secrets:ro
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      academic-service:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: mp_web
    restart: unless-stopped
    expose:
      - "80"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    networks:
      - mentorapredict-net
    depends_on:
      - kong
