_format_version: "3.0"
_transform: true

# ─── Global plugins: CORS + Correlation ID ───────────────────────────────────
plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Correlation-ID
      exposed_headers:
        - X-Correlation-ID
      credentials: true
      max_age: 3600
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true

# ─── JWT consumer (RS256 — public key injected at container start) ───────────
consumers:
  - username: mentorapredict-api
    jwt_secrets:
      - key: mentorapredict
        algorithm: RS256
        rsa_public_key: |
__JWT_PUBLIC_KEY__

# ─── auth-service (port 3001) ────────────────────────────────────────────────
services:
  - name: auth-service
    url: http://auth-service:3001
    routes:
      - name: auth-login
        paths:
          - /api/v1/auth/login
        methods:
          - POST
        regex_priority: 200
        plugins:
          - name: rate-limiting
            config:
              minute: 5
              policy: local
              limit_by: ip
              fault_tolerant: true

      - name: auth-logout
        paths:
          - /api/v1/auth/logout
        methods:
          - POST
        regex_priority: 150
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
          - name: rate-limiting
            config:
              minute: 100
              policy: local
              limit_by: ip
              fault_tolerant: true

      - name: auth-routes
        paths:
          - /api/v1/auth
        regex_priority: 100
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local
              limit_by: ip
              fault_tolerant: true

  - name: user-service
    url: http://user-service:3002
    routes:
      - name: user-routes
        paths:
          - /users
        regex_priority: 100
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
          - name: rate-limiting
            config:
              minute: 100
              policy: local
              limit_by: ip
              fault_tolerant: true

  - name: academic-service
    url: http://academic-service:3003
    routes:
      - name: academic-routes
        paths:
          - /api/v1/academic
        regex_priority: 100
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
          - name: rate-limiting
            config:
              minute: 100
              policy: local
              limit_by: ip
              fault_tolerant: true

  - name: analytics-service
    url: http://analytics-service:3004
    routes:
      - name: analytics-routes
        paths:
          - /api/v1/analytics
        regex_priority: 100
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
          - name: rate-limiting
            config:
              minute: 100
              policy: local
              limit_by: ip
              fault_tolerant: true

      - name: analytics-alerts
        paths:
          - /alerts
        regex_priority: 100
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
          - name: rate-limiting
            config:
              minute: 100
              policy: local
              limit_by: ip
              fault_tolerant: true
