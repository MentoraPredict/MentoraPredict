global:
  resolve_timeout: 5m
  smtp_from: __SMTP_FROM__
  smtp_smarthost: __SMTP_HOST__
  smtp_require_tls: __SMTP_TLS__

route:
  group_by:
    - alertname
    - severity
    - service
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: warning
      repeat_interval: 4h

receivers:
  - name: default
    email_configs:
      - to: __EMAIL_TO__
        send_resolved: true

  - name: critical
    email_configs:
      - to: __EMAIL_TO__
        send_resolved: true
        headers:
          subject: "[CRITICAL] {{ .GroupLabels.alertname }} - MentoraPredict"

  - name: warning
    email_configs:
      - to: __EMAIL_TO__
        send_resolved: true
        headers:
          subject: "[WARNING] {{ .GroupLabels.alertname }} - MentoraPredict"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal:
      - alertname
      - instance
