version: "3.9"

networks:
  mentorapredict-net:
    driver: bridge

volumes:
  postgres_data:
    name: mp_postgres_data
  mongo_data:
    name: mp_mongo_data
  redis_data:
    name: mp_redis_data

services:

  postgres:
    image: postgres:16-alpine
    container_name: mp_postgres
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mentorapredict-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7.0
    container_name: mp_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE:      ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mentorapredict-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7.2-alpine
    container_name: mp_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mentorapredict-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    image: ${DOCKERHUB_USERNAME}/api-gateway:${IMAGE_TAG:-latest}
    container_name: mp_api_gateway
    restart: always
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: ${API_GATEWAY_PORT:-3000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    image: ${DOCKERHUB_USERNAME}/auth-service:${IMAGE_TAG:-latest}
    container_name: mp_auth_service
    restart: always
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: ${AUTH_SERVICE_PORT:-3001}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    image: ${DOCKERHUB_USERNAME}/user-service:${IMAGE_TAG:-latest}
    container_name: mp_user_service
    restart: always
    ports:
      - "${USER_SERVICE_PORT:-3002}:3002"
    environment:
      NODE_ENV: production
      PORT: ${USER_SERVICE_PORT:-3002}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  academic-service:
    image: ${DOCKERHUB_USERNAME}/academic-service:${IMAGE_TAG:-latest}
    container_name: mp_academic_service
    restart: always
    ports:
      - "${ACADEMIC_SERVICE_PORT:-3003}:3003"
    environment:
      NODE_ENV: production
      PORT: ${ACADEMIC_SERVICE_PORT:-3003}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  metrics-service:
    image: ${DOCKERHUB_USERNAME}/metrics-service:${IMAGE_TAG:-latest}
    container_name: mp_metrics_service
    restart: always
    ports:
      - "${METRICS_SERVICE_PORT:-3004}:3004"
    environment:
      NODE_ENV: production
      PORT: ${METRICS_SERVICE_PORT:-3004}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-service:
    image: ${DOCKERHUB_USERNAME}/analytics-service:${IMAGE_TAG:-latest}
    container_name: mp_analytics_service
    restart: always
    ports:
      - "${ANALYTICS_SERVICE_PORT:-3006}:3006"
    environment:
      NODE_ENV: production
      PORT: ${ANALYTICS_SERVICE_PORT:-3006}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  recommendation-service:
    image: ${DOCKERHUB_USERNAME}/recommendation-service:${IMAGE_TAG:-latest}
    container_name: mp_recommendation_service
    restart: always
    ports:
      - "${RECOMMENDATION_SERVICE_PORT:-3005}:3005"
    environment:
      NODE_ENV: production
      PORT: ${RECOMMENDATION_SERVICE_PORT:-3005}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - mentorapredict-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prediction-service:
    image: ${DOCKERHUB_USERNAME}/prediction-service:${IMAGE_TAG:-latest}
    container_name: mp_prediction_service
    restart: always
    ports:
      - "${PREDICTION_SERVICE_PORT:-8000}:8000"
    environment:
      PYTHONUNBUFFERED: 1
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - mentorapredict-net
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ${DOCKERHUB_USERNAME}/web:${IMAGE_TAG:-latest}
    container_name: mp_web
    restart: always
    ports:
      - "${WEB_PORT:-80}:80"
    environment:
      NODE_ENV: production
    networks:
      - mentorapredict-net
    depends_on:
      - api-gateway
