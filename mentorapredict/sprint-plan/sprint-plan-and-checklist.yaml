# ============================================================
# MentoraPredict — Sprint Plan & Validation Checklist
# Phase 1: Contracts + Data Models + Infra (current)
# Phase 2+: Implementation sprints
# ============================================================


# ─────────────────────────────────────────────────────────────
# SPRINT PLAN — MVP BACKEND IMPLEMENTATION
# ─────────────────────────────────────────────────────────────
# Methodology: Scrum, 2-week sprints
# Team: 1 Backend Developer (Victor Cañar)
# Tech: NestJS (TS) + Python FastAPI + PostgreSQL + MongoDB + Redis
# ─────────────────────────────────────────────────────────────

sprint_0:
  name: "Architecture & Contracts (CURRENT PHASE)"
  duration: "Week 1-2"
  goal: "Zero code, all decisions documented. Team aligned before first line."
  deliverables:
    - "✅ OpenAPI contracts for all 7 microservices"
    - "✅ PostgreSQL DER (12 tables, ownership mapped)"
    - "✅ MongoDB collections design (4 collections)"
    - "✅ Redis cache design (key patterns + TTLs)"
    - "✅ Shared packages design (shared-types, config, utils)"
    - "✅ docker-compose.yml (Postgres + Mongo + Redis)"
    - "✅ .env.example with all required variables"
    - "✅ Sprint plan defined"
  acceptance:
    - "docker compose up -d starts all 3 datastores healthy"
    - "All contracts reviewed and approved"
    - "DER reviewed — no circular dependencies"
    - "Packages clearly defined — nothing shared that shouldn't be"

sprint_1:
  name: "Auth + User + Shared Foundation"
  duration: "Week 3-4"
  goal: "A user can register, login, and receive a JWT. Role assignment works."
  services: [auth-service, user-service]
  stories:
    - id: BE-101
      title: "RF-001: POST /api/v1/auth/register"
      details: "Hash password (bcrypt cost≥12), insert into users + user_profiles, return 201"
      priority: CRITICAL
    - id: BE-102
      title: "RF-002.1: POST /api/v1/auth/login → JWT RS256"
      details: "Validate credentials, sign JWT RS256, issue refresh token, store in Redis"
      priority: CRITICAL
    - id: BE-103
      title: "RF-002.4: POST /api/v1/auth/refresh"
      details: "Validate refresh token from Redis, issue new access token"
      priority: CRITICAL
    - id: BE-104
      title: "RF-003: POST /api/v1/auth/logout"
      details: "Delete refresh token from Redis"
      priority: HIGH
    - id: BE-105
      title: "RF-014: GET /api/v1/users/me + PATCH role (ADMIN)"
      details: "Protected route — extract JWT payload, return profile"
      priority: HIGH
    - id: BE-106
      title: "Shared packages: implement shared-types + shared-utils"
      details: "All enums, interfaces, pagination utils, redis key constants"
      priority: HIGH
    - id: BE-107
      title: "TypeORM migration: users, user_profiles, password_reset_tokens"
      details: "CreateUsersTable migration — no seeds yet"
      priority: CRITICAL
    - id: BE-108
      title: "GET /health for auth-service and user-service"
      details: "Check DB + Redis connectivity, return ServiceStatus JSON"
      priority: MEDIUM
  acceptance:
    - "POST /auth/login returns valid JWT (verifiable with public key)"
    - "Protected route returns 401 without token, 200 with valid token"
    - "Refresh flow: old token invalid after refresh"
    - "ADMIN can change role; STUDENT cannot"
    - "Unit test coverage ≥ 60% on service layer"

sprint_2:
  name: "Academic Core"
  duration: "Week 5-6"
  goal: "Academic hierarchy exists. Teacher can record grades. Data pipeline works."
  services: [academic-service]
  stories:
    - id: BE-201
      title: "RF-006/007/008: CRUD Faculties, Careers, Academic Periods"
      priority: CRITICAL
    - id: BE-202
      title: "RF-009/011: CRUD Subjects + teacher assignment"
      priority: CRITICAL
    - id: BE-203
      title: "RF-010: Enrollment — student joins subject"
      priority: CRITICAL
    - id: BE-204
      title: "RF-012: Evaluations + POST /grades (TEACHER only)"
      priority: CRITICAL
    - id: BE-205
      title: "RF-013: POST /ingest (Excel/CSV bulk import)"
      details: "Parse file, validate rows, insert grades, log job to MongoDB"
      priority: HIGH
    - id: BE-206
      title: "TypeORM migrations: all academic tables"
      priority: CRITICAL
    - id: BE-207
      title: "Seed script: synthetic data for testing (RNF-031)"
      details: "1 faculty, 1 career, 1 period, 5 subjects, 30 students, grades"
      priority: HIGH
  acceptance:
    - "Full academic hierarchy created via API calls"
    - "Teacher records grade → row exists in grades table"
    - "Excel ingestion: 30-student file imported without errors"
    - "Unit test coverage ≥ 60% on service layer"

sprint_3:
  name: "Metrics + Analytics + Risk"
  duration: "Week 7-8"
  goal: "Students have computed metrics. Risk classification works. Alerts generated."
  services: [metrics-service, analytics-service]
  stories:
    - id: BE-301
      title: "RF-015: Calculate academic average per student/subject"
      details: "Weight × grade sum / total weight. Cache result in Redis."
      priority: CRITICAL
    - id: BE-302
      title: "RF-016: Academic trend (compare current vs previous period average)"
      priority: HIGH
    - id: BE-303
      title: "RF-017: Compliance index (% evaluated activities submitted on time)"
      priority: HIGH
    - id: BE-304
      title: "RF-018: Risk classification (LOW/MEDIUM/HIGH) based on metrics thresholds"
      details: "Business rule: HIGH if average<6 AND complianceIndex<60. Persisted in academic_risk."
      priority: CRITICAL
    - id: BE-305
      title: "RF-021: Generate alert when risk is MEDIUM or HIGH"
      details: "Insert into alerts table. Expose GET /analytics/alerts."
      priority: HIGH
    - id: BE-306
      title: "Redis cache: student metrics + dashboards"
      details: "Implement redis.adapter.ts with TTLs from design doc"
      priority: HIGH
    - id: BE-307
      title: "TypeORM migrations: academic_metrics_snapshots, academic_risk, alerts"
      priority: CRITICAL
  acceptance:
    - "GET /metrics/students/:id returns correct average from seeded data"
    - "Student with average<6 → risk_level = HIGH in DB"
    - "Alert created automatically when risk changes to MEDIUM/HIGH"
    - "Second request for same student metrics served from Redis cache"

sprint_4:
  name: "Prediction (IA) + Recommendations"
  duration: "Week 9-10"
  goal: "ML model runs. OpenAI generates improvement plans. Full chain works."
  services: [prediction-service, recommendation-service]
  stories:
    - id: BE-401
      title: "RF-019: prediction-service — logistic regression model (scikit-learn)"
      details: "Train on synthetic data, expose POST /predict/risk, log to MongoDB"
      priority: CRITICAL
    - id: BE-402
      title: "RNF-042: Anonymization before prediction call"
      details: "Strip PII fields; use anonymousStudentId (UUID) in prediction payload"
      priority: CRITICAL
    - id: BE-403
      title: "analytics-service calls prediction-service for risk score"
      details: "Replace threshold-based (Sprint 3) with ML score from prediction-service"
      priority: HIGH
    - id: BE-404
      title: "RF-020: recommendation-service — call OpenAI GPT for improvement plan"
      details: "Build anonymized context, call OpenAI, save to MongoDB recommendation_plans"
      priority: CRITICAL
    - id: BE-405
      title: "RF-022: POST /observations (Teacher observation)"
      details: "Insert into observations table (PostgreSQL)"
      priority: MEDIUM
    - id: BE-406
      title: "Rate limiting for OpenAI calls (retry + backoff)"
      details: "Implement external adapter with retry logic (RNF-040)"
      priority: HIGH
  acceptance:
    - "POST /predict/risk returns risk score for anonymized features"
    - "prediction_logs entry in MongoDB for every inference"
    - "POST /recommendations/generate returns GPT plan (or mock if API unavailable)"
    - "Prediction service replaces threshold logic in analytics-service"
    - "pytest coverage ≥ 60% on prediction-service"

sprint_5:
  name: "Dashboards + Integration + Hardening"
  duration: "Week 11-12"
  goal: "All dashboards work end-to-end. Auth enforced. Rate limiting active. Health checks passing."
  services: [all]
  stories:
    - id: BE-501
      title: "RF-023/024/025: Dashboard endpoints (student/teacher/admin)"
      details: "Aggregate data from metrics + analytics + recommendations in single response"
      priority: HIGH
    - id: BE-502
      title: "RBAC enforcement audit — review all endpoints"
      details: "Verify every protected route has correct role guard"
      priority: CRITICAL
    - id: BE-503
      title: "Rate limiting (RNF-006) on all services"
      priority: HIGH
    - id: BE-504
      title: "GET /health on all 7 services with DB + Redis checks"
      priority: HIGH
    - id: BE-505
      title: "Correlation-id propagation across service calls"
      priority: MEDIUM
    - id: BE-506
      title: "Integration tests: full auth → grade → metric → risk → alert flow"
      priority: HIGH
    - id: BE-507
      title: "OpenAPI Swagger exposed at /api/docs on all services"
      priority: HIGH
  acceptance:
    - "Full flow: register → login → enroll → grade → metrics → risk → alert → recommendation"
    - "All services healthy via GET /health"
    - "Swagger UI accessible on each service"
    - "Unit test coverage ≥ 60% across all services"
    - "STUDENT cannot access ADMIN/TEACHER-only routes"


# ─────────────────────────────────────────────────────────────
# PHASE 0 (CURRENT) — VALIDATION CHECKLIST
# ─────────────────────────────────────────────────────────────

validation_checklist:
  title: "Sprint 0 Acceptance Criteria"
  category_contracts:
    - "[ ] OpenAPI contract exists for all 7 microservices"
    - "[ ] All endpoints include method, path, request/response DTOs"
    - "[ ] RBAC roles documented per endpoint (PUBLIC / JWT / ADMIN-only)"
    - "[ ] Required headers documented: Authorization, x-correlation-id, x-request-id"
    - "[ ] All paths use /api/v1 prefix"
    - "[ ] /health endpoint defined for every service"
    - "[ ] Prediction-service uses internal API key, not user JWT"
    - "[ ] Anonymization contract in prediction-service (no PII fields)"

  category_data_model:
    - "[ ] DER covers all 13 required tables"
    - "[ ] Each table has UUID PK and timestamp fields"
    - "[ ] FK relationships documented for all foreign keys"
    - "[ ] Table ownership mapped to correct microservice"
    - "[ ] Soft delete (is_active) on mutable entities"
    - "[ ] grades.value constraint: 0.00 to 10.00 documented"
    - "[ ] evaluations.weight noted (must sum to 100 per subject)"
    - "[ ] No cross-service FK (services reference by UUID, no cross-DB join)"

  category_nosql:
    - "[ ] recommendation_plans collection defined with example document"
    - "[ ] prediction_logs collection defined — no PII fields in example"
    - "[ ] ingestion_jobs collection defined for RF-013 tracking"
    - "[ ] audit_logs collection defined for traceability"
    - "[ ] RNF-042: prediction_logs uses anonymousStudentId"

  category_redis:
    - "[ ] Auth refresh token key pattern defined + TTL = 7 days"
    - "[ ] Password reset key pattern defined + TTL = 1 hour"
    - "[ ] Rate limit key pattern defined (RNF-006)"
    - "[ ] Student metrics cache defined + TTL = 1 hour"
    - "[ ] Dashboard keys defined per role (student/teacher/admin)"
    - "[ ] Risk classification key defined"
    - "[ ] Cache invalidation strategy documented"
    - "[ ] Naming convention followed: <service>:<entity>:<id>"

  category_shared_packages:
    - "[ ] Role enum defined in shared-types"
    - "[ ] RiskLevel enum defined in shared-types"
    - "[ ] JwtPayload interface defined (no sign logic)"
    - "[ ] InternalRequestHeaders interface defined"
    - "[ ] Redis key constants centralized in shared-types"
    - "[ ] PaginatedResponse generic interface defined"
    - "[ ] shared-utils: only pure functions (no side effects)"
    - "[ ] shared-config: only interfaces/shapes (no process.env reads)"
    - "[ ] Confirmed: zero business logic in any shared package"

  category_infra:
    - "[ ] docker-compose.yml has postgres:16, mongo:7, redis:7.2"
    - "[ ] All services have healthcheck defined"
    - "[ ] Volumes defined for data persistence"
    - "[ ] Single network (mentorapredict-net) for all services"
    - "[ ] Tools profile available (mongo-express, redis-commander)"
    - "[ ] .env.example covers all required variables"
    - "[ ] .env.example does NOT contain real secrets"
    - "[ ] docker compose up -d starts successfully"
    - "[ ] docker compose ps shows all 3 services healthy"

  category_documentation:
    - "[ ] This sprint plan reviewed and approved by team"
    - "[ ] Each microservice README updated with RF coverage"
    - "[ ] DELIVERY.md updated with Phase 1 status"
    - "[ ] Committed with conventional commit messages"


# ─────────────────────────────────────────────────────────────
# COMMIT SEQUENCE FOR THIS PHASE
# ─────────────────────────────────────────────────────────────
commits:
  - "docs(contracts): add openapi contract design for all 7 microservices"
  - "docs(data-models): add postgresql DER with 13 tables and ownership mapping"
  - "docs(data-models): add mongodb collections design with example documents"
  - "docs(data-models): add redis cache design with key patterns and TTLs"
  - "feat(packages): scaffold shared-types with enums, interfaces, constants"
  - "feat(packages): scaffold shared-config with database and jwt config interfaces"
  - "feat(packages): scaffold shared-utils with pure pagination, date, anonymization helpers"
  - "feat(infra): add docker-compose.yml for postgres, mongodb, redis local dev"
  - "chore(infra): add .env.example with all required variables"
  - "docs(sprints): add sprint plan sprint0-sprint5 with acceptance criteria"
  - "docs(validation): add phase 0 validation checklist"
