name: CI

on:
  push:
    branches: [QA]
  pull_request:
    branches: [QA, main]
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      force_all:
        description: "Force build all services"
        required: false
        default: "false"
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  FORCE_ALL: ${{ github.event.inputs.force_all || 'false' }}

jobs:
  commitlint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v5
        with:
          configFile: .commitlintrc.json
          helpURL: https://github.com/MentoraPredict/mentorapredict/blob/main/docs/commit-convention.md

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
      docker_matrix: ${{ steps.generate-matrix.outputs.docker_matrix }}
      packages: ${{ steps.filter.outputs.packages }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
            academic-service:
              - 'services/academic-service/**'
            user-service:
              - 'services/user-service/**'
            analytics-service:
              - 'services/analytics-service/**'
            web:
              - 'apps/web/**'
            kong:
              - 'infra/kong/**'
              - 'infra/keys/**'
            infra:
              - 'infra/docker/**'
              - 'docker-compose*.yml'
            packages:
              - 'packages/**'

      - name: Generate Matrix
        id: generate-matrix
        run: |
          cat <<EOF > matrix.json
          {
            "include": [
              {"service":"auth-service","type":"docker","dockerfile":"services/auth-service/Dockerfile","changed":"true"},
              {"service":"academic-service","type":"docker","dockerfile":"services/academic-service/Dockerfile","changed":"true"},
              {"service":"user-service","type":"docker","dockerfile":"services/user-service/Dockerfile","changed":"true"},
              {"service":"analytics-service","type":"docker","dockerfile":"services/analytics-service/Dockerfile","changed":"true"},
              {"service":"web","type":"docker","dockerfile":"apps/web/Dockerfile","changed":"true"},
              {"service":"kong","type":"compose","changed":"true"}
            ]
          }
          EOF

          matrix=$(jq -c . matrix.json)
          docker_matrix=$(jq -c '.include |= map(select(.type=="docker"))' matrix.json)

          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "docker_matrix=$docker_matrix" >> $GITHUB_OUTPUT

      - name: Debug outputs
        run: |
          echo "MATRIX:"
          echo '${{ steps.generate-matrix.outputs.matrix }}'
          echo "DOCKER_MATRIX:"
          echo '${{ steps.generate-matrix.outputs.docker_matrix }}'

  validate:
    name: Lint, Build, and Test (Validate)
    runs-on: ubuntu-latest
    needs: [detect-changes]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: |
          echo "LINT_STATUS=PASSED" >> $GITHUB_ENV
          pnpm lint || { echo "LINT_STATUS=FAILED" >> $GITHUB_ENV; exit 1; }

      - name: Build
        run: |
          echo "BUILD_STATUS=PASSED" >> $GITHUB_ENV
          pnpm build || { echo "BUILD_STATUS=FAILED" >> $GITHUB_ENV; exit 1; }

      - name: Run tests
        run: |
          echo "TEST_STATUS=PASSED" >> $GITHUB_ENV
          pnpm test || { echo "TEST_STATUS=FAILED" >> $GITHUB_ENV; exit 1; }

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v1
        continue-on-error: true

      - name: Validate workspace structure
        run: |
          echo "Validating workspace structure..."
          pnpm list --depth=0 || exit 1
          echo "[OK] Workspace structure is valid"

      - name: Show Matrix
        run: |
          echo '${{ needs.detect-changes.outputs.matrix }}'

      - name: CI Status Report
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit Convention | PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ env.LINT_STATUS }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ env.BUILD_STATUS }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ env.TEST_STATUS }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dockerfiles | CHECKED |" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | COMPLETED |" >> $GITHUB_STEP_SUMMARY

  docker-validate:
    name: Validate Dockerfiles
    if: needs.detect-changes.outputs.matrix != ''
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - validate
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.docker_matrix).include }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Summary
        run: |
          echo "## Docker Validation" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ matrix.service }} | ${{ matrix.changed }} |" >> $GITHUB_STEP_SUMMARY

      - name: Validate Dockerfile
        if: matrix.type == 'docker'
        run: |
          echo "[BUILD] Validating ${{ matrix.service }}"
          docker build -f ${{ matrix.dockerfile }} .

  build-and-push:
    name: Build and Push Docker Images
    if: >
      (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/QA') &&
      needs.detect-changes.outputs.docker_matrix != ''
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - validate
    environment: QA enviroment

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.docker_matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Debug matrix
        run: |
          echo "matrix raw: ${{ needs.detect-changes.outputs.matrix }}"
          echo "docker matrix raw: ${{ needs.detect-changes.outputs.docker_matrix }}"

      - name: Build Summary
        run: |
          echo "## Docker Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ matrix.service }} | ${{ matrix.changed }} |" >> $GITHUB_STEP_SUMMARY

      - name: Validate Secrets
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "Error: DOCKERHUB_USERNAME missing"
            exit 1
          fi

          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "Error: DOCKERHUB_TOKEN missing"
            exit 1
          fi
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Metadata
        if: matrix.type == 'docker'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=qa-latest
            type=sha,prefix=qa-,format=short

      - name: Setup Docker Buildx
        if: matrix.type == 'docker'
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        if: matrix.type == 'docker'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Trivy filesystem scanner
        if: matrix.type == 'docker'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Build and Push Image
        if: matrix.type == 'docker'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
