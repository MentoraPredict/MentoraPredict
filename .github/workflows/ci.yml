name: CI

on:
  pull_request:
    branches: [QA, main, dev]
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  commitlint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v5
        with:
          configFile: .commitlintrc.json
          helpURL: https://github.com/MentoraPredict/mentorapredict/blob/main/docs/commit-convention.md

  validate:
    name: Lint, Build, and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo build
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            apps/*/.turbo
            services/*/.turbo
            packages/*/.turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v1
        continue-on-error: true

      - name: Validate workspace structure
        run: pnpm list --depth=0

      - name: CI Status Report
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | Build | Tests | Security |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|-------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| OK | OK | OK | Gitleaks |" >> $GITHUB_STEP_SUMMARY

  build-and-push-dev:
    name: Build and Push Dev Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [commitlint, validate]
    if: github.base_ref == 'dev'
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - academic-service
          - analytics-service
          - web
        include:
          - service: auth-service
            dockerfile: services/auth-service/Dockerfile
          - service: user-service
            dockerfile: services/user-service/Dockerfile
          - service: academic-service
            dockerfile: services/academic-service/Dockerfile
          - service: analytics-service
            dockerfile: services/analytics-service/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=dev-latest
            type=sha,prefix=dev-,format=short

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
