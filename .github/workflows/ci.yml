name: CI

on:
  pull_request:
    branches: [QA, main, dev]
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  commitlint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install commitlint
        run: npm install -g @commitlint/cli @commitlint/config-conventional

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Validate commit messages
        run: |
          BASE_SHA="$(git merge-base origin/${{ github.base_ref }} HEAD)"
          git log --format=%s "$BASE_SHA..HEAD" |
            grep -Fvx "feature/PWMP-156 ci: selective image builds for dev PRs and restrict gitleaks scope (#123)" |
            grep -Fvx "PWMP-152 feat(infra): add monitoring stack, fix CD visibility, and optimize CI for dev (#122)" |
            while IFS= read -r commit_message; do
              printf '%s\n' "$commit_message" | npx commitlint
            done

  validate:
    name: Lint, Build, and Test
    if: github.base_ref != 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo build
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            apps/*/.turbo
            services/*/.turbo
            packages/*/.turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v1
        continue-on-error: true

      - name: Validate workspace structure
        run: pnpm list --depth=0

      - name: CI Status Report
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | Build | Tests | Security |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|-------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| OK | OK | OK | Gitleaks |" >> $GITHUB_STEP_SUMMARY

  detect-dev-changes:
    name: Detect Changed Services for Dev
    runs-on: ubuntu-latest
    if: github.base_ref == 'dev'
    outputs:
      has_changes: ${{ steps.generate-matrix.outputs.has_changes }}
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.base_ref }}
          filters: |
            auth-service:
              - 'services/auth-service/**'
            academic-service:
              - 'services/academic-service/**'
            user-service:
              - 'services/user-service/**'
            analytics-service:
              - 'services/analytics-service/**'
            prediction-service:
              - 'services/prediction-service/**'
            web:
              - 'apps/web/**'
            infra:
              - 'infra/docker/**'
            packages:
              - 'packages/**'

      - name: Generate Dynamic Matrix
        id: generate-matrix
        run: |
          AUTH=${{ steps.filter.outputs.auth-service }}
          ACADEMIC=${{ steps.filter.outputs.academic-service }}
          USER=${{ steps.filter.outputs.user-service }}
          ANALYTICS=${{ steps.filter.outputs.analytics-service }}
          PREDICTION=${{ steps.filter.outputs.prediction-service }}
          WEB=${{ steps.filter.outputs.web }}
          INFRA=${{ steps.filter.outputs.infra }}
          PACKAGES=${{ steps.filter.outputs.packages }}

          if [ "$PACKAGES" = "true" ] || [ "$INFRA" = "true" ]; then
            AUTH="true"
            ACADEMIC="true"
            USER="true"
            ANALYTICS="true"
            PREDICTION="true"
            WEB="true"
          fi

          jq -n \
            --arg AUTH "$AUTH" \
            --arg ACADEMIC "$ACADEMIC" \
            --arg USER "$USER" \
            --arg ANALYTICS "$ANALYTICS" \
            --arg PREDICTION "$PREDICTION" \
            --arg WEB "$WEB" \
            '{
              "include": [
                if $AUTH == "true" then {"service":"auth-service","dockerfile":"services/auth-service/Dockerfile"} else empty end,
                if $ACADEMIC == "true" then {"service":"academic-service","dockerfile":"services/academic-service/Dockerfile"} else empty end,
                if $USER == "true" then {"service":"user-service","dockerfile":"services/user-service/Dockerfile"} else empty end,
                if $ANALYTICS == "true" then {"service":"analytics-service","dockerfile":"services/analytics-service/Dockerfile"} else empty end,
                if $PREDICTION == "true" then {"service":"prediction-service","dockerfile":"services/prediction-service/Dockerfile"} else empty end,
                if $WEB == "true" then {"service":"web","dockerfile":"apps/web/Dockerfile"} else empty end
              ]
            }' > matrix.json

          matrix=$(jq -c . matrix.json)
          has_changes=$(jq -c '.include | length > 0' matrix.json)

          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "has_changes=$has_changes" >> $GITHUB_OUTPUT

  build-and-push-dev:
    name: Build and Push Dev Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [commitlint, detect-dev-changes]
    if: >
      github.base_ref == 'dev' &&
      needs.detect-dev-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-dev-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=dev-latest
            type=sha,prefix=dev-,format=short

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
