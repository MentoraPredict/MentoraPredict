name: CI

on:
  pull_request:
    branches: [qa, main]


jobs:
  validate:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Validate Dockerfiles
        run: |
          for service in api-gateway auth-service user-service academic-service metrics-service analytics-service recommendation-service prediction-service web; do
            docker build -f apps/$service/Dockerfile . || exit 1
          done

      - name: Test (if scripts exist)
        run: |
          if pnpm test --if-present; then
            echo "Tests executed successfully"
          else
            echo "No test script found in some packages - skipping"
          fi
