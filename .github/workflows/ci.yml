name: CI

on:
  pull_request:
    branches: [qa, main]
  pull_request_target:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  commitlint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v5
        with:
          configFile: .commitlintrc.json
          helpURL: https://github.com/MentoraPredict/mentorapredict/blob/main/docs/commit-convention.md

  validate:
    name: Lint, Build, and Test
    runs-on: ubuntu-latest
    needs: commitlint
    if: success() || failure()

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint all packages
        run: pnpm lint
        continue-on-error: true
        id: lint

      - name: Build all packages
        run: pnpm build
        continue-on-error: true
        id: build

      - name: Run tests
        run: pnpm test
        continue-on-error: true
        id: test

      - name: Validate Dockerfiles
        run: |
          echo "Checking Dockerfiles in services/ and apps/"
          # Microservices in services/
          for service in services/*/; do
            service_name=$(basename "$service")
            if [ -f "services/$service_name/Dockerfile" ]; then
              echo "[BUILD] Building services/$service_name ..."
              docker build -f "services/$service_name/Dockerfile" . || echo "[WARNING] Build for $service_name failed"
            else
              echo "[SKIP] No Dockerfile for services/$service_name"
            fi
          done
          # Frontends in apps/
          for service in apps/*/; do
            service_name=$(basename "$service")
            if [ -f "apps/$service_name/Dockerfile" ]; then
              echo "[BUILD] Building apps/$service_name ..."
              docker build -f "apps/$service_name/Dockerfile" . || echo "[WARNING] Build for $service_name failed"
            else
              echo "[SKIP] No Dockerfile for apps/$service_name"
            fi
          done

      - name: Validate workspace structure
        run: |
          echo "Validating workspace structure..."
          pnpm list --depth=0 || exit 1
          echo "[OK] Workspace structure is valid"

      - name: Check for exposed secrets
        run: |
          echo "Scanning for potential secrets in code..."
          if grep -r --include="*.js" --include="*.ts" --include="*.json" "password\|secret\|token\|key" --exclude-dir=node_modules --exclude="*.lock" . 2>/dev/null; then
            echo "[WARNING] Potential secrets found in code. Please review the files listed above."
          else
            echo "[OK] No obvious secrets found"
          fi

      - name: CI Status Report
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit Convention | PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ steps.lint.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.build.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.test.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dockerfiles | CHECKED |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Check | COMPLETED |" >> $GITHUB_STEP_SUMMARY

      - name: Fail CI if critical checks fail
        if: steps.lint.outcome == 'failure' && steps.build.outcome == 'failure'
        run: |
          echo "[ERROR] Critical checks failed: lint and build both failed."
          echo "Please fix lint and build errors before merging this pull request."
          exit 1