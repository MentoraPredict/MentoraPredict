name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.generate-matrix.outputs.has_changes }}
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
      docker_matrix: ${{ steps.generate-matrix.outputs.docker_matrix }}
      changed_services: ${{ steps.generate-matrix.outputs.changed_services }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
            academic-service:
              - 'services/academic-service/**'
            user-service:
              - 'services/user-service/**'
            analytics-service:
              - 'services/analytics-service/**'
            web:
              - 'apps/web/**'
            kong:
              - 'infra/kong/**'
              - 'infra/keys/**'
            monitoring:
              - 'infra/monitoring/**'
            infra:
              - 'infra/docker/**'
            packages:
              - 'packages/**'

      - name: Generate Dynamic Matrix
        id: generate-matrix
        run: |
          AUTH_CHANGED=${{ steps.filter.outputs.auth-service }}
          ACADEMIC_CHANGED=${{ steps.filter.outputs.academic-service }}
          USER_CHANGED=${{ steps.filter.outputs.user-service }}
          ANALYTICS_CHANGED=${{ steps.filter.outputs.analytics-service }}
          WEB_CHANGED=${{ steps.filter.outputs.web }}
          KONG_CHANGED=${{ steps.filter.outputs.kong }}
          MONITORING_CHANGED=${{ steps.filter.outputs.monitoring }}
          INFRA_CHANGED=${{ steps.filter.outputs.infra }}
          PACKAGES_CHANGED=${{ steps.filter.outputs.packages }}

          if [ "$PACKAGES_CHANGED" = "true" ] || [ "$INFRA_CHANGED" = "true" ]; then
            AUTH_CHANGED="true"
            ACADEMIC_CHANGED="true"
            USER_CHANGED="true"
            ANALYTICS_CHANGED="true"
            WEB_CHANGED="true"
            KONG_CHANGED="true"
            MONITORING_CHANGED="true"
          fi

          jq -n \
            --arg AUTH "$AUTH_CHANGED" \
            --arg ACADEMIC "$ACADEMIC_CHANGED" \
            --arg USER "$USER_CHANGED" \
            --arg ANALYTICS "$ANALYTICS_CHANGED" \
            --arg WEB "$WEB_CHANGED" \
            --arg KONG "$KONG_CHANGED" \
            '{
              "include": [
                if $AUTH == "true" then {"service":"auth-service","type":"docker","dockerfile":"services/auth-service/Dockerfile","changed":"true"} else empty end,
                if $ACADEMIC == "true" then {"service":"academic-service","type":"docker","dockerfile":"services/academic-service/Dockerfile","changed":"true"} else empty end,
                if $USER == "true" then {"service":"user-service","type":"docker","dockerfile":"services/user-service/Dockerfile","changed":"true"} else empty end,
                if $ANALYTICS == "true" then {"service":"analytics-service","type":"docker","dockerfile":"services/analytics-service/Dockerfile","changed":"true"} else empty end,
                if $WEB == "true" then {"service":"web","type":"docker","dockerfile":"apps/web/Dockerfile","changed":"true"} else empty end,
                if $KONG == "true" then {"service":"kong","type":"compose","changed":"true"} else empty end
              ]
            }' > matrix.json

          matrix=$(jq -c . matrix.json)
          docker_matrix=$(jq -c '.include |= map(select(.type=="docker"))' matrix.json)
          has_changes=$(jq -c '.include | length > 0' matrix.json)
          changed_services=$(jq -r '[.include[].service] | join(", ")' matrix.json)

          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "docker_matrix=$docker_matrix" >> $GITHUB_OUTPUT
          echo "has_changes=$has_changes" >> $GITHUB_OUTPUT
          echo "changed_services=$changed_services" >> $GITHUB_OUTPUT

      - name: Debug outputs
        run: |
          echo "HAS CHANGES: ${{ steps.generate-matrix.outputs.has_changes }}"
          echo "CHANGED SERVICES: ${{ steps.generate-matrix.outputs.changed_services }}"
          echo "MATRIX: ${{ steps.generate-matrix.outputs.matrix }}"
          echo "DOCKER MATRIX: ${{ steps.generate-matrix.outputs.docker_matrix }}"

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: detect-changes
    if: >
      needs.detect-changes.outputs.has_changes == 'true' &&
      github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.docker_matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Debug matrix
        run: |
          echo "service: ${{ matrix.service }}"
          echo "type: ${{ matrix.type }}"

      - name: Build Summary
        run: |
          echo "## Docker Build Status" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Mode |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ matrix.service }} | Production |" >> $GITHUB_STEP_SUMMARY

      - name: Validate Secrets
        run: |
          test -n "${DOCKERHUB_USERNAME}"
          test -n "${DOCKERHUB_TOKEN}"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Metadata
        if: matrix.type == 'docker'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=main-latest
            type=sha,prefix=main-,format=short
            type=semver,pattern=v{{version}}

      - name: Setup Docker Buildx
        if: matrix.type == 'docker'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: matrix.type == 'docker'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Trivy filesystem scanner
        if: matrix.type == 'docker'
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Build and Push Image
        if: matrix.type == 'docker'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-prod:
    name: Deploy to EC2 Production
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    environment: Prod Enviroment
    timeout-minutes: 30
    if: >
      needs.detect-changes.outputs.has_changes == 'true' &&
      github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy Summary
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Changed Services | ${{ needs.detect-changes.outputs.changed_services }} |" >> $GITHUB_STEP_SUMMARY

      - name: Resolve deploy SHA
        id: sha
        run: echo "value=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            DEPLOY_SHA="${{ steps.sha.outputs.value }}"
            SHORT_SHA=$(echo "$DEPLOY_SHA" | cut -c1-7)
            IMAGE_TAG="main-${SHORT_SHA}"

            sudo mkdir -p /opt/mentorapredict
            sudo chown ubuntu:ubuntu /opt/mentorapredict
            cd /opt/mentorapredict

            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/main
            else
              git clone https://github.com/${{ github.repository }} .
              git checkout main
            fi

            echo "[ENV] Creating .env"
            cat > .env << EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            MONGO_USER=${{ secrets.MONGO_USER }}
            MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            MONGO_DB=${{ secrets.MONGO_DB }}
            KONG_PROXY_PORT=${{ secrets.KONG_PROXY_PORT }}
            EOF

            echo "JWT_PRIVATE_KEY=$(printf '%s' '${{ secrets.JWT_PRIVATE_KEY }}' | base64 -w0)" >> .env
            echo "JWT_PUBLIC_KEY=$(printf '%s' '${{ secrets.JWT_PUBLIC_KEY }}' | base64 -w0)" >> .env

            echo "WEB_PORT=80" >> .env

            if docker pull ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:${IMAGE_TAG} &>/dev/null; then
              echo "[TAG] Using build tag: ${IMAGE_TAG}"
            else
              echo "[TAG] Build tag ${IMAGE_TAG} not found — using branch latest"
              IMAGE_TAG="main-latest"
            fi

            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env

            echo "[CLEAN] Removing existing application containers"
            docker compose --env-file .env -f infra/docker/docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
            echo "[CLEAN] Cleanup completed"

            echo "[KEYS] Creating certificate directories..."
            sudo mkdir -p /opt/mentorapredict/infra/keys
            sudo chown ubuntu:ubuntu /opt/mentorapredict/infra/keys

            echo "[INFRA] Starting infrastructure"
            docker compose --env-file .env -f infra/docker/docker-compose.infra.yml up -d postgres mongo redis

            echo "[WAIT DB READY]"
            for i in {1..20}; do
              docker exec $(docker ps -q --filter name=postgres) pg_isready && break
              echo "waiting postgres..."
              sleep 3
            done

            echo "[PULL IMAGES]"
            docker compose --env-file .env -f infra/docker/docker-compose.prod.yml pull

            echo "[MIGRATIONS - SAFE ORDER]"
            docker compose --env-file .env -f infra/docker/docker-compose.prod.yml run --rm auth-service npm run migration:run
            docker compose --env-file .env -f infra/docker/docker-compose.prod.yml run --rm user-service npm run migration:run
            docker compose --env-file .env -f infra/docker/docker-compose.prod.yml run --rm academic-service npm run migration:run
            docker compose --env-file .env -f infra/docker/docker-compose.prod.yml run --rm analytics-service npm run migration:run

            echo "[START SERVICES]"
            docker compose --env-file .env -f infra/docker/docker-compose.prod.yml up -d --force-recreate

            echo "[MONITORING] Starting monitoring stack"
            docker compose --env-file .env -f infra/monitoring/docker-compose.monitoring.yml up -d 2>/dev/null || echo "[MONITORING] Monitoring stack not available — skipping"

            docker system prune -af --filter "until=24h"

            echo "[OK] Deployment completed"
            echo ""
            echo "[STATUS] Final services status:"
            docker compose --env-file .env -f infra/docker/docker-compose.prod.yml ps

      - name: Deployment Summary
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy SHA: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changed: ${{ needs.detect-changes.outputs.changed_services }}" >> $GITHUB_STEP_SUMMARY
          echo "- Strategy: Selective build from registry (Production)" >> $GITHUB_STEP_SUMMARY

  create-release:
    name: Create Release Tag
    if: success() && needs.deploy-to-prod.result == 'success'
    uses: ./.github/workflows/release.yml
    needs: deploy-to-prod
    with:
      tag-prefix: v
      prerelease: false
      release-name: "Release"
