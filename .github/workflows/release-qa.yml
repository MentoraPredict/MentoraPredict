name: Create QA Release

on:
  workflow_run:
    workflows: ["Deploy to QA"]
    types:
      - completed
    branches:
      - QA

jobs:
  create-qa-release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/github-script@v6
        id: release
        with:
          script: |
            const { execSync } = require('child_process');

            const headSha = context.payload.workflow_run.head_sha;

            const lastTag = (() => {
              try {
                return execSync('git describe --tags --match "qa-v*" --abbrev=0 2>/dev/null').toString().trim();
              } catch {
                return 'qa-v0.0.0';
              }
            })();

            const logOutput = execSync(`git log ${lastTag}..HEAD --pretty=format:"%s"`).toString();
            const prMatches = logOutput.match(/#[0-9]+/g) || [];
            const prNumbers = [...new Set(prMatches.map(m => m.replace('#', '')))];

            const repo = context.repo;
            let hasBreaking = false;
            let hasFeature = false;

            for (const pr of prNumbers) {
              const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                ...repo,
                issue_number: parseInt(pr)
              });
              const names = labels.map(l => l.name);
              if (names.includes('breaking')) hasBreaking = true;
              if (names.includes('feature')) hasFeature = true;
            }

            const cleanTag = lastTag.replace('qa-', '');
            const [maj, min, pat] = cleanTag.replace('v', '').split('.').map(Number);
            let major = maj, minor = min, patch = pat;

            if (hasBreaking) { major++; minor = 0; patch = 0; }
            else if (hasFeature) { minor++; patch = 0; }
            else { patch++; }

            const newVersion = `qa-v${major}.${minor}.${patch}`;

            try {
              await github.rest.git.getRef({
                ...repo,
                ref: `tags/${newVersion}`
              });
              core.setFailed(`Tag ${newVersion} already exists. Aborting to prevent duplicate.`);
              return;
            } catch (err) {
              if (err.status !== 404) {
                throw err;
              }
            }

            await github.rest.git.createRef({
              ...repo,
              ref: `refs/tags/${newVersion}`,
              sha: headSha
            });

            const shortSha = headSha.substring(0, 7);

            await github.rest.repos.createRelease({
              ...repo,
              tag_name: newVersion,
              name: `QA Release ${newVersion}`,
              body: `## QA Release ${newVersion}\n\nDeployed commit: \`${shortSha}\` (\`${headSha}\`)\n\nThis pre-release was automatically generated from a successful QA deployment.`,
              generate_release_notes: true,
              draft: false,
              prerelease: true
            });

            core.setOutput('new_version', newVersion);
