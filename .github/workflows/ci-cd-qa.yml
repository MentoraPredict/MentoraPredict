name: CI/CD QA

on:
  push:
    branches: [QA]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            dockerfile: services/auth-service/Dockerfile
          - service: academic-service
            dockerfile: services/academic-service/Dockerfile
          - service: user-service
            dockerfile: services/user-service/Dockerfile
          - service: analytics-service
            dockerfile: services/analytics-service/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Validate Secrets
        run: |
          test -n "${DOCKERHUB_USERNAME}"
          test -n "${DOCKERHUB_TOKEN}"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=qa-latest
            type=sha,prefix=qa-,format=short

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-qa:
    name: Deploy to EC2 QA
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 15
    environment: QA enviroment
    steps:
      - uses: actions/checkout@v4
        with:
          ref: QA

      - name: Resolve deploy SHA
        id: sha
        run: echo "value=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            DEPLOY_SHA="${{ steps.sha.outputs.value }}"
            SHORT_SHA=$(echo "$DEPLOY_SHA" | cut -c1-7)
            IMAGE_TAG="qa-${SHORT_SHA}"

            sudo mkdir -p /opt/mentorapredict
            sudo chown ubuntu:ubuntu /opt/mentorapredict
            cd /opt/mentorapredict

            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }} .
            fi

            git fetch origin
            git reset --hard origin/QA

            cat > .env << EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            MONGO_USER=${{ secrets.MONGO_USER }}
            MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            MONGO_DB=${{ secrets.MONGO_DB }}
            JWT_PRIVATE_KEY=${{ secrets.JWT_PRIVATE_KEY }}
            JWT_PUBLIC_KEY=${{ secrets.JWT_PUBLIC_KEY }}
            EOF
            echo "WEB_PORT=${WEB_PORT:-80}" >> .env

            sudo mkdir -p /opt/mentorapredict/infra/keys
            sudo chown ubuntu:ubuntu /opt/mentorapredict/infra/keys

            IMAGE_TAG=$IMAGE_TAG docker compose -f infra/docker/docker-compose.infra.yml up -d postgres mongo redis
            IMAGE_TAG=$IMAGE_TAG docker compose -f infra/docker/docker-compose.qa.yml pull kong
            IMAGE_TAG=$IMAGE_TAG docker compose -f infra/docker/docker-compose.qa.yml up -d kong --force-recreate
            IMAGE_TAG=$IMAGE_TAG docker compose -f infra/docker/docker-compose.qa.yml pull
            IMAGE_TAG=$IMAGE_TAG docker compose -f infra/docker/docker-compose.qa.yml up -d --force-recreate
            docker system prune -af --filter "until=24h"

      - name: Deployment Summary
        run: |
          echo "## QA Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy SHA: ${{ steps.sha.outputs.value }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image tag: qa-$(echo ${{ steps.sha.outputs.value }} | cut -c1-7)" >> $GITHUB_STEP_SUMMARY