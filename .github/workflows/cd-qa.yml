name: CD QA

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed
    branches:
      - QA
  workflow_dispatch:

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  deploy-to-qa:
    name: Deploy to EC2 QA
    runs-on: ubuntu-latest
    needs: [detect-changes]
    environment: QA enviroment
    if: |
      (github.event_name == 'workflow_run' && 
      github.event.workflow_run.head_branch == 'QA' &&
      github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            DEPLOY_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
            SHORT_SHA=$(echo "$DEPLOY_SHA" | cut -c1-7)
            IMAGE_TAG="qa-${SHORT_SHA}"

            sudo mkdir -p /opt/mentorapredict
            sudo chown ubuntu:ubuntu /opt/mentorapredict

            cd /opt/mentorapredict

            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/QA
            else
              git clone https://github.com/${{ github.repository }} .
              git checkout QA
            fi

            echo "[ENV] Creating .env"
            cat > .env << EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            MONGO_USER=${{ secrets.MONGO_USER }}
            MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            MONGO_DB=${{ secrets.MONGO_DB }}
            JWT_PRIVATE_KEY=${{ secrets.JWT_PRIVATE_KEY }}
            JWT_PUBLIC_KEY=${{ secrets.JWT_PUBLIC_KEY }}
            EOF

            echo "WEB_PORT=${WEB_PORT:-80}" >> .env

            echo "[KEYS] Creating certificate directories..."
            sudo mkdir -p /opt/mentorapredict/infra/keys
            sudo chown ubuntu:ubuntu /opt/mentorapredict/infra/keys

            echo "[INFRA] Starting infrastructure"
            IMAGE_TAG=$IMAGE_TAG docker compose \
              -f infra/docker/docker-compose.infra.yml \
              up -d postgres mongo redis

            echo "[KONG] Starting API Gateway"
            IMAGE_TAG=$IMAGE_TAG docker compose \
              -f infra/docker/docker-compose.qa.yml \
              pull kong
            IMAGE_TAG=$IMAGE_TAG docker compose \
              -f infra/docker/docker-compose.qa.yml \
              up -d kong

            echo "[APP] Deploying all services"

            IMAGE_TAG=$IMAGE_TAG docker compose \
              -f infra/docker/docker-compose.qa.yml \
              pull

            IMAGE_TAG=$IMAGE_TAG docker compose \
              -f infra/docker/docker-compose.qa.yml \
              up -d --force-recreate

            echo "[OK] Deployment completed"

      - name: Deployment Summary
        run: |
          echo "## QA Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy SHA: ${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Strategy: Full deploy from registry (QA)" >> $GITHUB_STEP_SUMMARY
