name: Deploy to QA

on:
  push:
    branches: [QA]

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
      docker_matrix: ${{ steps.generate-matrix.outputs.docker_matrix }}
      packages: ${{ steps.filter.outputs.packages }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
            academic-service:
              - 'services/academic-service/**'
            user-service:
              - 'services/user-service/**'
            analytics-service:
              - 'services/analytics-service/**'
            web:
              - 'apps/web/**'
            kong:
              - 'infra/kong/**'
              - 'infra/keys/**'
            infra:
              - 'infra/docker/**'
            packages:
              - 'packages/**'

      - name: Generate Matrix (changed:true TEMPORAL)
        id: generate-matrix
        run: |
          cat <<EOF > matrix.json
          {
            "include": [
              {"service":"auth-service","type":"docker","dockerfile":"services/auth-service/Dockerfile","changed":"true"},
              {"service":"academic-service","type":"docker","dockerfile":"services/academic-service/Dockerfile","changed":"true"},
              {"service":"user-service","type":"docker","dockerfile":"services/user-service/Dockerfile","changed":"true"},
              {"service":"analytics-service","type":"docker","dockerfile":"services/analytics-service/Dockerfile","changed":"true"},
              {"service":"web","type":"docker","dockerfile":"apps/web/Dockerfile","changed":"true"},
              {"service":"kong","type":"compose","changed":"true"}
            ]
          }
          EOF

          matrix=$(jq -c . matrix.json)
          docker_matrix=$(jq -c '.include |= map(select(.type=="docker"))' matrix.json)

          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "docker_matrix=$docker_matrix" >> $GITHUB_OUTPUT

      - name: Debug outputs
        run: |
          echo "MATRIX:"
          echo '${{ steps.generate-matrix.outputs.matrix }}'
          echo "DOCKER_MATRIX:"
          echo '${{ steps.generate-matrix.outputs.docker_matrix }}'

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: detect-changes
    if: >
      needs.detect-changes.outputs.docker_matrix != '' &&
      github.ref == 'refs/heads/QA'

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.docker_matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Debug matrix
        run: |
          echo "service: ${{ matrix.service }}"
          echo "type: ${{ matrix.type }}"

      - name: Build Summary
        run: |
          echo "## Docker Build Status" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Mode |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ matrix.service }} | QA |" >> $GITHUB_STEP_SUMMARY

      - name: Validate Secrets
        run: |
          test -n "${DOCKERHUB_USERNAME}"
          test -n "${DOCKERHUB_TOKEN}"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Metadata
        if: matrix.type == 'docker'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=qa-latest
            type=sha,prefix=qa-,format=short

      - name: Setup Docker Buildx
        if: matrix.type == 'docker'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: matrix.type == 'docker'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Trivy filesystem scanner
        if: matrix.type == 'docker'
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Build and Push Image
        if: matrix.type == 'docker'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-qa:
    name: Deploy to EC2 QA
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: QA enviroment
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: QA

      - name: Resolve deploy SHA
        id: sha
        run: echo "value=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            DEPLOY_SHA="${{ steps.sha.outputs.value }}"
            SHORT_SHA=$(echo "$DEPLOY_SHA" | cut -c1-7)
            IMAGE_TAG="qa-${SHORT_SHA}"

            sudo mkdir -p /opt/mentorapredict
            sudo chown ubuntu:ubuntu /opt/mentorapredict
            cd /opt/mentorapredict

            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/QA
            else
              git clone https://github.com/${{ github.repository }} .
              git checkout QA
            fi

            echo "[ENV] Creating .env"
            cat > .env << EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            MONGO_USER=${{ secrets.MONGO_USER }}
            MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            MONGO_DB=${{ secrets.MONGO_DB }}
            KONG_PROXY_PORT=${{ secrets.KONG_PROXY_PORT }}
            EOF

            echo "JWT_PRIVATE_KEY=$(printf '%s' '${{ secrets.JWT_PRIVATE_KEY }}' | base64 -w0)" >> .env
            echo "JWT_PUBLIC_KEY=$(printf '%s' '${{ secrets.JWT_PUBLIC_KEY }}' | base64 -w0)" >> .env

            echo "WEB_PORT=80" >> .env

            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env

            echo "[CLEAN] Removing existing application containers"
            docker compose --env-file .env -f infra/docker/docker-compose.qa.yml down --remove-orphans 2>/dev/null || true
            echo "[CLEAN] Cleanup completed"

            echo "[KEYS] Creating certificate directories..."
            sudo mkdir -p /opt/mentorapredict/infra/keys
            sudo chown ubuntu:ubuntu /opt/mentorapredict/infra/keys

            echo "[INFRA] Starting infrastructure"
            docker compose --env-file .env -f infra/docker/docker-compose.infra.yml up -d postgres mongo redis

            echo "[KONG] Starting API Gateway"
            docker compose --env-file .env -f infra/docker/docker-compose.qa.yml pull kong
            docker compose --env-file .env -f infra/docker/docker-compose.qa.yml up -d kong --force-recreate

            echo "[APP] Deploying all services"

            docker compose --env-file .env -f infra/docker/docker-compose.qa.yml pull
            docker compose --env-file .env -f infra/docker/docker-compose.qa.yml up -d --force-recreate

            docker system prune -af --filter "until=24h"

            echo "[OK] Deployment completed"
            echo ""
            echo "[STATUS] Final services status:"
            docker compose --env-file .env -f infra/docker/docker-compose.qa.yml ps

      - name: Deployment Summary
        run: |
          echo "## QA Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy SHA: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Strategy: Full deploy from registry (QA)" >> $GITHUB_STEP_SUMMARY

  create-qa-release:
    name: Create QA Release Tag
    uses: ./.github/workflows/release.yml
    needs: deploy-to-qa
    with:
      tag-prefix: qa-v
      prerelease: true
      release-name: "QA Release"
