name: CD QA

on:
  push:
    branches:
      - QA
  workflow_dispatch:

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      auth-service: ${{ steps.filter.outputs.auth-service }}
      academic-service: ${{ steps.filter.outputs.academic-service }}
      kong: ${{ steps.filter.outputs.kong }}
      web: ${{ steps.filter.outputs.web }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
            academic-service:
              - 'services/academic-service/**'
            web:
              - 'apps/web/**'
            kong:
              - 'infra/kong/**'
              - 'infra/keys/**'
            packages:
              - 'packages/**'

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: detect-changes
    environment: QA enviroment

    strategy:
      matrix:
        include:
          - service: auth-service
            path: services/auth-service/Dockerfile
          - service: academic-service
            path: services/academic-service/Dockerfile
          - service: web
            path: apps/web/Dockerfile

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Determine if service should be built
        id: should_build
        run: |
          SERVICE="${{ matrix.service }}"
          PACKAGES_CHANGED="${{ needs.detect-changes.outputs.packages }}"

          if [ "$PACKAGES_CHANGED" == "true" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
            echo "[INFO] Packages changed, building $SERVICE"
            exit 0
          fi

          if [ "$SERVICE" == "auth-service" ]; then
            CHANGED="${{ needs.detect-changes.outputs.auth-service }}"
          elif [ "$SERVICE" == "academic-service" ]; then
            CHANGED="${{ needs.detect-changes.outputs.academic-service }}"
          elif [ "$SERVICE" == "web" ]; then
            CHANGED="${{ needs.detect-changes.outputs.web }}"
          else
            CHANGED="false"
          fi

          echo "build=$CHANGED" >> $GITHUB_OUTPUT

          if [ "$CHANGED" == "true" ]; then
            echo "[INFO] $SERVICE was modified, building..."
          else
            echo "[SKIP] $SERVICE was not modified"
          fi

      - name: Validate Secrets
        if: steps.should_build.outputs.build == 'true'
        run: |
          if [ -z "${{ env.DOCKERHUB_USERNAME }}" ]; then
            echo "Error: DOCKERHUB_USERNAME secret not set"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Error: DOCKERHUB_TOKEN secret not set"
            exit 1
          fi

      - name: Docker Metadata
        if: steps.should_build.outputs.build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=qa-latest
            type=sha,prefix=qa-,format=short

      - name: Setup Docker Buildx
        if: steps.should_build.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.should_build.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        if: steps.should_build.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-qa:
    name: Deploy to EC2 QA
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    environment: QA enviroment
    if: github.ref == 'refs/heads/QA'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            sudo mkdir -p /opt/mentorapredict
            sudo chown ubuntu:ubuntu /opt/mentorapredict

            cd /opt/mentorapredict

            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }} .
              git checkout QA
            else
              git fetch origin
              git reset --hard origin/QA
            fi

            SHORT_SHA=$(git rev-parse --short HEAD)
            IMAGE_TAG="qa-${SHORT_SHA}"

            cat > .env << EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            MONGO_USER=${{ secrets.MONGO_USER }}
            MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            MONGO_DB=${{ secrets.MONGO_DB }}
            JWT_PUBLIC_KEY=${{ secrets.JWT_PUBLIC_KEY }}
            EOF

            export WEB_PORT=${WEB_PORT:-80}
            echo "WEB_PORT=$WEB_PORT" >> .env

            echo "[INFRA] Ensuring databases are up..."
            IMAGE_TAG=$IMAGE_TAG docker compose \
              -f infra/docker/docker-compose.infra.yml \
              up -d postgres mongo redis

            echo "[KONG] Ensuring Kong API Gateway is up..."
            docker compose -f infra/docker/docker-compose.qa.yml pull kong
            docker compose -f infra/docker/docker-compose.qa.yml up -d kong

            CHANGED_SERVICES=""
            PACKAGES_CHANGED="${{ needs.detect-changes.outputs.packages }}"

            if [ "${{ needs.detect-changes.outputs.auth-service }}" == "true" ] || [ "$PACKAGES_CHANGED" == "true" ]; then
              CHANGED_SERVICES="$CHANGED_SERVICES auth-service"
            fi
            if [ "${{ needs.detect-changes.outputs.academic-service }}" == "true" ] || [ "$PACKAGES_CHANGED" == "true" ]; then
              CHANGED_SERVICES="$CHANGED_SERVICES academic-service"
            fi
            if [ "${{ needs.detect-changes.outputs.web }}" == "true" ] || [ "$PACKAGES_CHANGED" == "true" ]; then
              CHANGED_SERVICES="$CHANGED_SERVICES web"
            fi

            if [ -z "$CHANGED_SERVICES" ]; then
              echo "[SKIP] No services were modified. Skipping deployment."
              echo "No changes detected in auth-service, academic-service, web, or kong."
            else
              echo "[DEPLOY] Pulling and restarting changed services: $CHANGED_SERVICES"

              for service in $CHANGED_SERVICES; do
                echo "[PULL] Pulling $service ..."
                IMAGE_TAG=$IMAGE_TAG docker compose \
                  -f infra/docker/docker-compose.qa.yml \
                  pull "$service"
              done

              for service in $CHANGED_SERVICES; do
                echo "[UP] Redeploying $service ..."
                IMAGE_TAG=$IMAGE_TAG docker compose \
                  -f infra/docker/docker-compose.qa.yml \
                  up -d "$service" \
                  --force-recreate
              done

              echo "Waiting for services to start..."
              for i in $(seq 1 30); do
                if curl -sf http://localhost:${WEB_PORT}/ > /dev/null 2>&1; then
                  echo "[OK] Kong is up and routing requests"
                  break
                fi
                echo "Attempt $i/30..."
                sleep 5
              done
            fi

            docker system prune -af --filter "until=24h"

      - name: Deployment Summary
        run: |
          echo "## QA Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Changed | Built | Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|-------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| auth-service | ${{ needs.detect-changes.outputs.auth-service }} | ${{ needs.detect-changes.outputs.auth-service }} | ${{ needs.detect-changes.outputs.auth-service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| academic-service | ${{ needs.detect-changes.outputs.academic-service }} | ${{ needs.detect-changes.outputs.academic-service }} | ${{ needs.detect-changes.outputs.academic-service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| web | ${{ needs.detect-changes.outputs.web }} | ${{ needs.detect-changes.outputs.web }} | ${{ needs.detect-changes.outputs.web }} |" >> $GITHUB_STEP_SUMMARY
          echo "| kong | ${{ needs.detect-changes.outputs.kong }} | ${{ needs.detect-changes.outputs.kong }} | ${{ needs.detect-changes.outputs.kong }} |" >> $GITHUB_STEP_SUMMARY
          echo "| packages | ${{ needs.detect-changes.outputs.packages }} | - | - |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure (postgres, mongo, redis): Always running" >> $GITHUB_STEP_SUMMARY
          echo "API Gateway: Kong on port 80 (routes /api/auth, /api/academic, and / to web)" >> $GITHUB_STEP_SUMMARY
