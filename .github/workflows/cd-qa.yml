name: CD QA

on:
  push:
    branches: [QA]
  workflow_run:
    workflows: [CI]
    types:
      - completed
  workflow_dispatch:

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  deploy-to-qa:
    name: Deploy to EC2 QA
    runs-on: ubuntu-latest
    environment: QA enviroment
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'QA'
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: QA

      - name: Resolve deploy SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            DEPLOY_SHA="${{ steps.sha.outputs.value }}"
            SHORT_SHA=$(echo "$DEPLOY_SHA" | cut -c1-7)
            IMAGE_TAG="qa-${SHORT_SHA}"

            sudo mkdir -p /opt/mentorapredict
            sudo chown ubuntu:ubuntu /opt/mentorapredict
            cd /opt/mentorapredict

            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }} .
            fi

            git fetch origin
            git reset --hard origin/QA

            cat > .env << EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            MONGO_USER=${{ secrets.MONGO_USER }}
            MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            MONGO_DB=${{ secrets.MONGO_DB }}
            JWT_PRIVATE_KEY=${{ secrets.JWT_PRIVATE_KEY }}
            JWT_PUBLIC_KEY=${{ secrets.JWT_PUBLIC_KEY }}
            EOF
            echo "WEB_PORT=${WEB_PORT:-80}" >> .env

            sudo mkdir -p /opt/mentorapredict/infra/keys
            sudo chown ubuntu:ubuntu /opt/mentorapredict/infra/keys

            IMAGE_TAG=$IMAGE_TAG docker compose \
              -f infra/docker/docker-compose.infra.yml \
              up -d postgres mongo redis

            IMAGE_TAG=$IMAGE_TAG docker compose \
              -f infra/docker/docker-compose.qa.yml \
              pull kong

            IMAGE_TAG=$IMAGE_TAG docker compose \
              -f infra/docker/docker-compose.qa.yml \
              up -d kong --force-recreate

            IMAGE_TAG=$IMAGE_TAG docker compose \
              -f infra/docker/docker-compose.qa.yml \
              pull

            IMAGE_TAG=$IMAGE_TAG docker compose \
              -f infra/docker/docker-compose.qa.yml \
              up -d --force-recreate

            docker system prune -af --filter "until=24h"

      - name: Deployment Summary
        run: |
          echo "## QA Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy SHA: ${{ steps.sha.outputs.value }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image tag: qa-$(echo ${{ steps.sha.outputs.value }} | cut -c1-7)" >> $GITHUB_STEP_SUMMARY