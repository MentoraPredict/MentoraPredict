name: CD QA

on:
  push:
    branches:
      - QA
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_TAG_PREFIX: qa
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    environment: QA enviroment

    strategy:
      matrix:
        include:
          # Implementados y desplegables
          - service: auth-service
            path: services

          - service: academic-service
            path: services

          - service: web
            path: apps

          # Agregar cuando estén implementados y pasen CI
          # - service: user-service
          #   path: services

          # Placeholders / En desarrollo
          # - service: api-gateway
          #   path: services

          # - service: metrics-service
          #   path: services

          # - service: analytics-service
          #   path: services

          # - service: recommendation-service
          #   path: services

          # - service: prediction-service
          #   path: services

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Secrets
        run: |
          if [ -z "${{ env.DOCKERHUB_USERNAME }}" ]; then
            echo "Error: DOCKERHUB_USERNAME secret not set"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Error: DOCKERHUB_TOKEN secret not set"
            exit 1
          fi

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=${{ env.IMAGE_TAG_PREFIX }}-,format=short

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-qa:
    name: Deploy to EC2 QA
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: QA environment
    if: github.ref == 'refs/heads/QA'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            sudo mkdir -p /opt/mentorapredict
            sudo chown ubuntu:ubuntu /opt/mentorapredict

            cd /opt/mentorapredict

            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }} .
              git checkout QA
            else
              git fetch origin
              git reset --hard origin/QA
            fi

            SHORT_SHA=$(git rev-parse --short HEAD)
            IMAGE_TAG="qa-${SHORT_SHA}"

            cat > .env << EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            MONGO_USER=${{ secrets.MONGO_USER }}
            MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            MONGO_DB=${{ secrets.MONGO_DB }}
            EOF

            export WEB_PORT=${WEB_PORT:-80}
            echo "WEB_PORT=$WEB_PORT" >> .env

            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml pull

            IMAGE_TAG=$IMAGE_TAG docker compose \
              -f docker-compose.prod.yml \
              up -d \
              --force-recreate \
              --remove-orphans

            echo "Waiting for services to start..."

            for i in $(seq 1 30); do
              if curl -sf http://localhost:${WEB_PORT} > /dev/null 2>&1; then
                echo "✅ Web is up"
                break
              fi

              echo "⏳ Attempt $i/30..."
              sleep 5
            done

            docker system prune -af --filter "until=24h"

      - name: Deployment Summary
        run: |
          echo "QA deployment completed successfully."
