name: CD QA

on:
  push:
    branches:
      - QA
  workflow_dispatch:

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      auth-service: ${{ steps.filter.outputs.auth-service }}
      academic-service: ${{ steps.filter.outputs.academic-service }}
      kong: ${{ steps.filter.outputs.kong }}
      web: ${{ steps.filter.outputs.web }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Detect changed services
        id: filter
        run: |
          echo "auth-service=false" >> $GITHUB_OUTPUT
          echo "user-service=false" >> $GITHUB_OUTPUT
          echo "academic-service=false" >> $GITHUB_OUTPUT
          echo "analytics-service=false" >> $GITHUB_OUTPUT
          echo "web=false" >> $GITHUB_OUTPUT
          echo "kong=false" >> $GITHUB_OUTPUT
          echo "packages=false" >> $GITHUB_OUTPUT

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          if [ -z "$CHANGED_FILES" ]; then
            ROOT=$(git rev-list --max-parents=0 HEAD 2>/dev/null || echo "")
            if [ -n "$ROOT" ]; then
              CHANGED_FILES=$(git diff --name-only "$ROOT" HEAD 2>/dev/null || echo "")
            fi
          fi

          if [ -z "$CHANGED_FILES" ]; then
            exit 0
          fi

          if echo "$CHANGED_FILES" | grep -q "^services/auth-service/"; then echo "auth-service=true" >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED_FILES" | grep -q "^services/user-service/"; then echo "user-service=true" >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED_FILES" | grep -q "^services/academic-service/"; then echo "academic-service=true" >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED_FILES" | grep -q "^services/analytics-service/"; then echo "analytics-service=true" >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED_FILES" | grep -q "^apps/web/"; then echo "web=true" >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED_FILES" | grep -qE "^infra/kong/|^infra/keys/"; then echo "kong=true" >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED_FILES" | grep -q "^packages/"; then echo "packages=true" >> $GITHUB_OUTPUT; fi

  deploy-to-qa:
    name: Deploy to EC2 QA
    runs-on: ubuntu-latest
    needs: [detect-changes]
    environment: QA enviroment
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            DEPLOY_SHA="${{ github.sha }}"
            SHORT_SHA=$(echo "$DEPLOY_SHA" | cut -c1-7)
            IMAGE_TAG="qa-${SHORT_SHA}"

            sudo mkdir -p /opt/mentorapredict
            sudo chown ubuntu:ubuntu /opt/mentorapredict

            cd /opt/mentorapredict

            PREVIOUS_SHA=""
            if [ -d ".git" ]; then
              PREVIOUS_SHA=$(git rev-parse --short HEAD 2>/dev/null || echo "")
              git fetch origin
              git reset --hard origin/QA
            else
              git clone https://github.com/${{ github.repository }} .
              git checkout QA
            fi

            cat > .env << EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            MONGO_USER=${{ secrets.MONGO_USER }}
            MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            MONGO_DB=${{ secrets.MONGO_DB }}
            JWT_PRIVATE_KEY=${{ secrets.JWT_PRIVATE_KEY }}
            JWT_PUBLIC_KEY=${{ secrets.JWT_PUBLIC_KEY }}
            EOF

            export WEB_PORT=${WEB_PORT:-80}
            echo "WEB_PORT=$WEB_PORT" >> .env

            echo "[KEYS] Creating certificate directories..."
            sudo mkdir -p /opt/mentorapredict/infra/keys
            sudo chown ubuntu:ubuntu /opt/mentorapredict/infra/keys

            echo "[INFRA] Ensuring databases are up..."
            IMAGE_TAG=$IMAGE_TAG docker compose \
              -f infra/docker/docker-compose.infra.yml \
              up -d postgres mongo redis

            echo "[KONG] Ensuring Kong API Gateway is up..."
            docker compose -f infra/docker/docker-compose.qa.yml pull kong
            docker compose -f infra/docker/docker-compose.qa.yml up -d kong

            CHANGED_SERVICES=""
            PACKAGES_CHANGED="${{ needs.detect-changes.outputs.packages }}"

            if [ "${{ needs.detect-changes.outputs.auth-service }}" == "true" ] || [ "$PACKAGES_CHANGED" == "true" ]; then
              CHANGED_SERVICES="$CHANGED_SERVICES auth-service"
            fi
            if [ "${{ needs.detect-changes.outputs.academic-service }}" == "true" ] || [ "$PACKAGES_CHANGED" == "true" ]; then
              CHANGED_SERVICES="$CHANGED_SERVICES academic-service"
            fi
            if [ "${{ needs.detect-changes.outputs.web }}" == "true" ] || [ "$PACKAGES_CHANGED" == "true" ]; then
              CHANGED_SERVICES="$CHANGED_SERVICES web"
            fi

            if [ -z "$CHANGED_SERVICES" ]; then
              echo "[SKIP] No services were modified. Skipping deployment."
              echo "No changes detected in auth-service, academic-service, web, or kong."
            else
              echo "[DEPLOY] Pulling and restarting changed services: $CHANGED_SERVICES"

              for service in $CHANGED_SERVICES; do
                echo "[PULL] Pulling $service ..."
                IMAGE_TAG=$IMAGE_TAG docker compose \
                  -f infra/docker/docker-compose.qa.yml \
                  pull "$service"
              done

              for service in $CHANGED_SERVICES; do
                echo "[UP] Redeploying $service ..."
                IMAGE_TAG=$IMAGE_TAG docker compose \
                  -f infra/docker/docker-compose.qa.yml \
                  up -d "$service" \
                  --force-recreate
              done

              echo "Waiting for services to start..."
              HEALTHY=false
              for i in $(seq 1 30); do
                if curl -sf http://localhost:${WEB_PORT}/ > /dev/null 2>&1; then
                  echo "[OK] Kong is up and routing requests"
                  HEALTHY=true
                  break
                fi
                echo "Attempt $i/30..."
                sleep 5
              done

              if [ "$HEALTHY" != "true" ]; then
                echo "[ERROR] Healthcheck failed after 30 attempts"

                if [ -n "$PREVIOUS_SHA" ]; then
                  OLD_IMAGE_TAG="qa-${PREVIOUS_SHA}"
                  echo "[ROLLBACK] Restoring services to previous version: $OLD_IMAGE_TAG"

                  for service in $CHANGED_SERVICES; do
                    echo "[ROLLBACK] Pulling $service with tag $OLD_IMAGE_TAG ..."
                    IMAGE_TAG=$OLD_IMAGE_TAG docker compose \
                      -f infra/docker/docker-compose.qa.yml \
                      pull "$service"
                  done

                  for service in $CHANGED_SERVICES; do
                    echo "[ROLLBACK] Restoring $service ..."
                    IMAGE_TAG=$OLD_IMAGE_TAG docker compose \
                      -f infra/docker/docker-compose.qa.yml \
                      up -d "$service" \
                      --force-recreate
                  done

                  echo "[ROLLBACK] Rollback complete"
                else
                  echo "[ROLLBACK] No previous version found. Services may be in bad state."
                fi

                exit 1
              fi
            fi

            docker system prune -af --filter "until=24h"

      - name: Deployment Summary
        run: |
          echo "## QA Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Changed | Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| auth-service | ${{ needs.detect-changes.outputs.auth-service }} | ${{ needs.detect-changes.outputs.auth-service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| academic-service | ${{ needs.detect-changes.outputs.academic-service }} | ${{ needs.detect-changes.outputs.academic-service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| web | ${{ needs.detect-changes.outputs.web }} | ${{ needs.detect-changes.outputs.web }} |" >> $GITHUB_STEP_SUMMARY
          echo "| kong | ${{ needs.detect-changes.outputs.kong }} | ${{ needs.detect-changes.outputs.kong }} |" >> $GITHUB_STEP_SUMMARY
          echo "| packages | ${{ needs.detect-changes.outputs.packages }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure (postgres, mongo, redis): Always running" >> $GITHUB_STEP_SUMMARY
          echo "API Gateway: Kong on port 80 (routes /api/auth, /api/academic, and / to web)" >> $GITHUB_STEP_SUMMARY
